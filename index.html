<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deadlock Detection & Prevention Simulator</title>
    

    <!-- Bootstrap CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >

    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1">
      Deadlock Detection & Prevention Simulator
    </span>
  </div>
</nav>

<div class="container mb-5">

  <!-- STEP 1: Basic input for process/resource counts -->
  <div class="card mb-4">
    <div class="card-header">
      <strong>1. System Configuration</strong>
    </div>
    <div class="card-body">
      <form id="configForm" class="row g-3">
        <div class="col-md-4">
          <label for="numProcesses" class="form-label">Number of Processes (P)</label>
          <input type="number" min="1" max="30" class="form-control" id="numProcesses" value="3">
        </div>
        <div class="col-md-4">
          <label for="numResources" class="form-label">Number of Resource Types (R)</label>
          <input type="number" min="1" max="20" class="form-control" id="numResources" value="3">
        </div>
        <div class="col-md-4 d-flex align-items-end">
          <button type="button" id="generateMatricesBtn" class="btn btn-primary w-100 shadow-sm">
            Generate Matrices
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- STEP 2: Matrices (Allocation, Max, Available, Request) -->
  <div class="card mb-4">
    <div class="card-header">
      <strong>2. Enter Resource Allocation Details</strong>
    </div>
    <div class="card-body">

      <div class="row mb-3">
        <div class="col-md-6">
          <h6>Allocation Matrix</h6>
          <div id="allocationMatrixContainer"></div>
        </div>
        <div class="col-md-6">
          <h6>Max Matrix (for Banker's Algorithm)</h6>
          <div id="maxMatrixContainer"></div>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <h6>Available Vector</h6>
          <div id="availableVectorContainer"></div>
        </div>
        <div class="col-md-6">
          <h6>Request Matrix (for RAG / prevention schemes)</h6>
          <div id="requestMatrixContainer"></div>
        </div>
      </div>

      <button type="button" id="readDataBtn" class="btn btn-outline-secondary">
        Read Data (Test Input)
      </button>
      <span id="readDataStatus" class="ms-3 text-success fw-semibold"></span>
    </div>
  </div>

  <!-- STEP 3: Algorithm selection + run buttons -->
  <div class="card mb-4">
    <div class="card-header">
      <strong>3. Choose Algorithm</strong>
    </div>
    <div class="card-body">
      <div class="btn-group mb-3" role="group">
        <button type="button" class="btn btn-outline-dark" id="btnRAG">
          Deadlock Detection (RAG)
        </button>
        <button type="button" class="btn btn-outline-dark" id="btnBanker">
          Banker's Algorithm (Avoidance)
        </button>
      </div>

      <div>
        <button type="button" id="runAlgorithmBtn" class="btn btn-success">
          Run Selected Algorithm
        </button>
      </div>
    </div>
  </div>

  <!-- STEP 4: Output + Visualization -->
  <div class="card mb-4">
    <div class="card-header">
      <strong>4. Output</strong>
    </div>
    <div class="card-body">
      <div id="textOutput" class="mb-3"></div>
      <div id="tableOutput" class="mb-3"></div>
      <div>
        <h6>Graph / RAG Visualization</h6>
        <div id="graphContainer" style="height: 400px; border: 1px solid #ccc;"></div>
      </div>
    </div>
  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Our JS files -->
<script src="js/rag.js"></script>
<script src="js/banker.js"></script>
<script src="js/main.js"></script>

</body>
</html>
